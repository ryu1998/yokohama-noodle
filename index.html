<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>横浜ラーメン</title>
	<link rel="stylesheet" href="./style.css" />
</head>

<body>
	<!-- App header -->
	<header class="app-header">
      <button id="menuButton" class="menu-button" aria-label="メニューを開く">
			<span></span>
			<span></span>
			<span></span>
      </button>

      <div class="header-inner">
			<div class="header-title">
				<h1>横浜ラーメン</h1>
				<p>ピンを押してお店を確認</p>
			</div>

			<div id="completionStatus" class="header-status"></div>
      </div>
	</header>

	<!-- Main content -->
	<main>
		<section class="map-section">
			<div class="map-wrapper" id="mapWrapper">
				<div class="map-layer">
				<img
					src="./assets/yokohama-map.png"
					alt="横浜駅周辺マップ"
					class="map-image"
				/>
				</div>
				<div id="pinLayer"></div>
			</div>
		</section>

		<section class="shop-section">
			<div id="shopList" class="shop-list"></div>
		</section>
	</main>

	<!-- Visit modal -->
	<div id="modal" class="modal hidden">
      <div class="modal-content">
			<button id="closeModal" class="close-button">×</button>

			<h2 id="modalShopName"></h2>
			<div id="modalShopLink" class="modal-shop-link"></div>

			<div id="visitHistory" class="visit-history"></div>

			<form id="visitForm" class="visit-form">
				<label>
					名前
					<select id="visitorName" required>
					<option value="">メンバーを選択</option>
					</select>
				</label>

				<label>
					現在の状態
					<select id="visitorStatus" required>
					<option value="余裕">😋 余裕</option>
					<option value="普通">🙂 普通</option>
					<option value="腹八分目">😐 腹八分目</option>
					<option value="限界">🤢 限界</option>
					<option value="撃沈">💀 撃沈</option>
					</select>
				</label>

				<label>
					コメント
					<textarea id="comment" placeholder="例：家系で一番好き"></textarea>
				</label>

				<label>
					ラーメン写真
					<input type="file" id="photoInput" accept="image/*" required />
				</label>

				<div id="visitError" class="form-error hidden"></div>

				<button
					type="button"
					id="bowserCallButton"
					class="bowser-call-button"
				>
					<span class="bowser-call-icon">🐷</span>
					<span>
						バウザー召喚
						<small>1人1回だけ使える禁断のコール</small>
					</span>
				</button>

				<button type="submit">行った記録を登録</button>
			</form>
      </div>
   </div>

   <!-- Side menu modal -->
	<div id="menuModal" class="menu-modal hidden">
      <div class="menu-content">
			<button id="closeMenu" class="close-button">×</button>
			<h2>メニュー</h2>

			<div class="menu-section">
				<div class="menu-section-title">メンバー</div>
				<button id="openAddMemberModal" class="menu-item-button">メンバー追加</button>
				<button id="openMemberStatusModal" class="menu-item-button">メンバー状態</button>
			</div>

			<div class="menu-section">
				<div class="menu-section-title">記録</div>
				<button id="openConquestProgressModal" class="menu-item-button">制覇メーター</button>
				<button id="openMemberRecordModal" class="menu-item-button">個人戦績</button>
				<button id="openRecordModal" class="menu-item-button">杯数ランキング</button>
				<button id="openTabelogModal" class="menu-item-button">食べログ</button>
			</div>

			<div class="admin-menu-area">
				<div class="menu-section-title">管理者</div>
				<button id="openAdminModal" class="menu-item-button admin-button">管理者用</button>
			</div>
      </div>
	</div>

	<!-- Add member modal -->
	<div id="addMemberModal" class="modal hidden">
      <div class="modal-content">
			<button id="closeAddMemberModal" class="close-button">×</button>
			<h2>メンバー追加</h2>

			<form id="memberForm" class="visit-form">
				<label>
					メンバー名
					<input
					type="text"
					id="memberName"
					required
					placeholder="例：ラーメンマン"
					/>
				</label>

				<button type="submit">追加</button>
			</form>
      </div>
	</div>

	<!-- Member status modal -->
	<div id="memberStatusModal" class="modal hidden">
      <div class="modal-content">
			<button id="closeMemberStatusModal" class="close-button">×</button>
			<h2>メンバー状態</h2>

			<div id="memberList" class="member-list"></div>
      </div>
	</div>

	<!-- Tabelog modal -->
	<div id="tabelogModal" class="modal hidden">
      <div class="modal-content">
			<button id="closeTabelogModal" class="close-button">×</button>
			<h2>食べログ</h2>

			<div id="tabelogList" class="tabelog-list"></div>
      </div>
	</div>

	<!-- Ranking modal -->
	<div id="recordModal" class="modal hidden">
      <div class="modal-content">
			<button id="closeRecordModal" class="close-button">×</button>
			<h2>杯数ランキング</h2>

			<div id="rankingList" class="ranking-list"></div>
      </div>
	</div>

	<!-- Member record modal -->
	<div id="memberRecordModal" class="modal hidden">
      <div class="modal-content">
			<button id="closeMemberRecordModal" class="close-button">×</button>
			<h2>個人戦績</h2>

			<div id="memberRecordList" class="member-record-list"></div>
      </div>
	</div>

	<!-- Conquest progress modal -->
	<div id="conquestProgressModal" class="modal hidden">
      <div class="modal-content">
			<button id="closeConquestProgressModal" class="close-button">×</button>
			<h2>制覇メーター</h2>

			<div id="conquestProgressContent" class="conquest-progress-content"></div>
      </div>
   </div>

	<!-- Admin modal -->
	<div id="adminModal" class="modal hidden">
      <div class="modal-content">
			<button id="closeAdminModal" class="close-button">×</button>
			<h2>管理者用</h2>

			<div class="admin-panel">
				<h3>店舗座標更新</h3>

				<label class="admin-field">
					<span>座標を更新する店舗</span>
					<select id="adminShopSelect">
					<option value="">店舗を選択</option>
					</select>
				</label>

				<button id="toggleCoordinateMode" type="button">
					座標取得モード：OFF
				</button>

				<p class="admin-help">
					店舗を選択し、座標取得モードをONにしてから、地図上の任意の場所をクリックしてください。
				</p>

				<div class="admin-coordinate-box">
					<div id="adminLastCoordinate">座標：未取得</div>
					<div id="adminSqlCoordinate">SQL：未取得</div>
					<div id="adminUpdateStatus"></div>
					<div id="adminCopyStatus"></div>
				</div>

				<hr class="admin-divider" />

				<div class="admin-add-shop">
					<h3>店舗追加</h3>

					<label class="admin-field">
						<span>店舗名</span>
						<input
							type="text"
							id="adminNewShopName"
							placeholder="例：吉村家"
						/>
					</label>

					<label class="admin-field">
						<span>エリア</span>
						<select id="adminNewShopArea">
							<option value="">エリアを選択</option>
						</select>
					</label>

					<button id="adminAddShopButton" type="button">
						店舗を追加
					</button>

					<div id="adminAddShopStatus" class="admin-status"></div>
				</div>

				<hr class="admin-divider" />
			</div>
      </div>
	</div>

	<!-- Area conquest modal -->
	<div id="areaConquestModal" class="modal hidden">
      <div class="modal-content complete-conquest-content">
			<button id="closeAreaConquestModal" class="close-button">×</button>

			<div class="complete-conquest-title">👑 エリア制覇！</div>
			<div id="areaConquestSubtitle" class="complete-conquest-subtitle"></div>
			<div class="complete-conquest-message">
				このエリアの全店舗を訪問しました 🍜
			</div>
      </div>
	</div>

	<!-- Complete conquest modal -->
	<div id="completeConquestModal" class="modal hidden">
      <div class="modal-content complete-conquest-content">
			<button id="closeCompleteConquestModal" class="close-button">×</button>

			<div class="complete-conquest-title">🎉 完全制覇！ 🎉</div>
			<div class="complete-conquest-subtitle">横浜ラーメン制覇達成！</div>
			<div class="complete-conquest-message">
				全店舗訪問完了。お疲れさまでした 🍜👑
			</div>
		</div>
	</div>

	<div id="bowserConfirmModal" class="modal hidden">
		<div class="modal-content bowser-modal-content">
			<button id="closeBowserConfirmModal" class="close-button">×</button>

			<div class="bowser-modal-icon">🐷</div>
			<div class="bowser-modal-title">バウザー召喚</div>
			<div class="bowser-modal-message">
				本当にバウザーを召喚しますか？<br />
				この力はメンバー1人につき1回だけ使えます。
			</div>

			<div class="bowser-modal-actions">
				<button id="cancelBowserCall" type="button" class="bowser-cancel-button">
					やめる
				</button>
				<button id="confirmBowserCall" type="button" class="bowser-confirm-button">
					🐷 召喚する
				</button>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="./app.js"></script>
</body>
</html>
