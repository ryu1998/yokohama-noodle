<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>横浜ラーメンマップ</title>
	<link rel="stylesheet" href="./style.css" />
</head>
<body>
	<header class="app-header">
		<div class="header-inner">
			<div class="header-title">
				<h1>横浜ラーメンマップ</h1>
				<p>ピンを押すとお店を確認できます</p>
			</div>

			<button id="menuButton" class="menu-button" aria-label="メニューを開く">
				<span></span>
				<span></span>
				<span></span>
			</button>
		</div>
	</header>

	<main>
		<section class="map-section">
			<div class="map-wrapper" id="mapWrapper">
			<img src="./assets/yokohama-map.png" alt="横浜駅周辺マップ" class="map-image" />
			<div id="pinLayer"></div>
			</div>
		</section>

		<section class="shop-section">
			<h2>ラーメン屋一覧</h2>
			<div id="shopList" class="shop-list"></div>
		</section>
	</main>

	<div id="modal" class="modal hidden">
		<div class="modal-content">
			<button id="closeModal" class="close-button">×</button>

			<h2 id="modalShopName"></h2>

			<div id="visitHistory" class="visit-history"></div>

			<form id="visitForm" class="visit-form">
			<label>
				名前
				<select id="visitorName" required>
					<option value="">メンバーを選択</option>
				</select>
			</label>

			<label>
				コメント
				<textarea id="comment" placeholder="例：家系で一番好き"></textarea>
			</label>

			<label>
				ラーメン写真
				<input type="file" id="photoInput" accept="image/*" required />
			</label>

			<button type="submit">行った記録を登録</button>
			</form>
		</div>
	</div>

	<div id="menuModal" class="menu-modal hidden">
		<div class="menu-content">
			<button id="closeMenu" class="close-button">×</button>
			<h2>メニュー</h2>

			<button id="openMemberModal" class="menu-item-button">メンバー追加</button>
			<button id="openRecordModal" class="menu-item-button">記録</button>
		</div>
	</div>

	<div id="memberModal" class="modal hidden">
		<div class="modal-content">
			<button id="closeMemberModal" class="close-button">×</button>
			<h2>メンバー追加</h2>

			<form id="memberForm" class="visit-form">
				<label>
					メンバー名
					<input type="text" id="memberName" required placeholder="例：りゅうのすけ" />
				</label>

				<button type="submit">追加</button>
			</form>

			<div id="memberList" class="member-list"></div>
		</div>
	</div>

	<div id="recordModal" class="modal hidden">
		<div class="modal-content">
			<button id="closeRecordModal" class="close-button">×</button>
			<h2>記録</h2>

			<div id="rankingList" class="ranking-list"></div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="./app.js"></script>
</body>
</html>
